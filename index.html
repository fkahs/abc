<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Jump Game!</title>
    <style>
        body { text-align: center; background: #f0f0f0; font-family: sans-serif; }
        canvas { background: #fff; border: 2px solid #333; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Jump Game!</h1>
    <canvas id="gameCanvas" width="800" height="200"></canvas>
    <p>스페이스바를 눌러 점프하세요!</p>

    <script src="app.js"></script>
</body>
</html>
<style>
    body { 
        text-align: center; 
        background: #f0f0f0; 
        font-family: sans-serif; 
        margin: 0; 
        overflow: hidden; /* 화면 밖 스크롤 방지 */
        touch-action: manipulation; /* 더블탭 줌 방지 */
    }
    canvas { 
        background: #fff; 
        border-bottom: 2px solid #333; 
        max-width: 100%; /* 화면 너비에 맞게 조절 */
        height: auto; 
    }
    h1 { margin-top: 10px; font-size: 20px; }
    p { font-size: 14px; color: #666; }
</style>
